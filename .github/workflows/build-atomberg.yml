name: Build Atomberg Control

on:
  push:
    branches:
      - main

jobs:
  build-macos-arm:
    runs-on: macos-26
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Create credentials file
        run: echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt --break-system-packages
          pip3 install pyinstaller --break-system-packages

      - name: Generate encrypted credentials
        run: python3 encrypt_credentials.py

      - name: Build for macOS
        run: |
          pyinstaller --windowed \
          --name="Atomberg Control" \
          --add-data="encrypted_credentials.txt:." \
          main.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          cd dist
          create-dmg \
            --volname "Atomberg Control" \
            --window-pos 200 120 \
            --window-size 400 400 \
            --icon-size 128 \
            --icon "Atomberg Control.app" 100 150 \
            --app-drop-link 300 150 \
            --no-internet-enable \
            "Atomberg Control.dmg" \
            "Atomberg Control.app"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v6
        with:
          name: Atomberg Control
          path: dist/Atomberg Control.dmg