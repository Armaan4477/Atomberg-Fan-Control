name: Build Atomberg Control

on:
  push:
    branches:
      - main

jobs:
  build-macos-arm:
    runs-on: macos-26
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Create credentials file
        run: echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt --break-system-packages
          pip3 install pyinstaller --break-system-packages

      - name: Generate encrypted credentials
        run: python3 encrypt_credentials.py

      - name: Build for macOS
        run: |
          pyinstaller --windowed \
          --name="E-HR Mgnt System" \
          --add-data="images:images" \
          --add-data="encrypted_credentials.txt:." \
          --add-data "Admin.py:." \
          --add-data "Employee.py:." \
          --add-data "Manager.py:." \
          --add-data "HR.py:." \
          main.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          cd dist
          create-dmg \
            --volname "E-HR Mgnt System" \
            --window-pos 200 120 \
            --window-size 400 400 \
            --icon-size 128 \
            --icon "E-HR Mgnt System.app" 100 150 \
            --app-drop-link 300 150 \
            --no-internet-enable \
            "E-HR Mgnt System(macos-arm).dmg" \
            "E-HR Mgnt System.app"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: E-HR Mgnt System(macOS arm)
          path: dist/E-HR Mgnt System(macos-arm).dmg